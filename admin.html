<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NETFLEET — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1B2A6B;
      --cyan: #00BFD8;
      --gray-50: #f8f9fa;
      --gray-100: #e9ecef;
      --gray-400: #868e96;
      --gray-600: #495057;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --gold: #b45309;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: #1a1a2e; min-height: 100vh; }

    /* ── LOGIN ── */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); }
    .login-box  { background: white; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-logo { font-size: 22px; font-weight: 800; color: var(--navy); letter-spacing: -1px; margin-bottom: 0.25rem; }
    .login-logo span { color: var(--cyan); }
    .login-sub  { font-size: 12px; color: var(--gray-400); margin-bottom: 2rem; letter-spacing: 0.5px; }
    .login-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gray-600); margin-bottom: 6px; display: block; }
    .login-input { width: 100%; border: 1.5px solid var(--gray-100); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; margin-bottom: 1rem; transition: border .2s; }
    .login-input:focus { border-color: var(--cyan); }
    .login-btn  { width: 100%; background: var(--navy); color: white; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background .2s; }
    .login-btn:hover { background: var(--cyan); color: var(--navy); }
    .login-error { font-size: 12px; color: var(--red); margin-top: 10px; text-align: center; min-height: 18px; }

    /* ── ADMIN LAYOUT ── */
    .admin-wrap { display: none; min-height: 100vh; }
    .admin-nav  { background: var(--navy); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .admin-nav-logo { font-size: 16px; font-weight: 800; color: white; letter-spacing: -0.5px; }
    .admin-nav-logo span { color: var(--cyan); }
    .admin-nav-right { display: flex; align-items: center; gap: 12px; }
    .admin-nav-user { font-size: 12px; color: rgba(255,255,255,0.5); }
    .admin-nav-out  { font-size: 12px; color: var(--cyan); cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; font-weight: 600; }

    .admin-body { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    /* ── TABS ── */
    .tabs-nav { display: flex; gap: 4px; margin-bottom: 1.75rem; background: white; border: 1px solid var(--gray-100); border-radius: 12px; padding: 4px; width: fit-content; }
    .tab-btn  { padding: 8px 20px; border-radius: 9px; border: none; background: transparent; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--gray-400); transition: all .2s; }
    .tab-btn.active { background: var(--navy); color: white; }
    .tab-section { display: none; }
    .tab-section.active { display: block; }

    /* ── STATS ── */
    .stats-bar  { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 2rem; }
    .stat-card  { background: white; border-radius: 14px; padding: 1.25rem 1.5rem; border: 1px solid var(--gray-100); }
    .stat-num   { font-size: 2rem; font-weight: 800; color: var(--navy); letter-spacing: -1px; }
    .stat-lbl   { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--gray-400); margin-top: 2px; }
    .stat-card.pendiente .stat-num { color: var(--orange); }
    .stat-card.aprobado  .stat-num { color: var(--green); }
    .stat-card.rechazado .stat-num { color: var(--red); }
    .stat-card.ofertas-act .stat-num { color: var(--cyan); }

    /* ── FILTROS ── */
    .filtros    { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .filtro-btn { padding: 7px 16px; border-radius: 100px; border: 1.5px solid var(--gray-100); background: white; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--gray-600); transition: all .2s; }
    .filtro-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
    .filtros-sep { width: 1px; height: 24px; background: var(--gray-100); }

    /* ── TABLA USUARIOS ── */
    .tabla-wrap  { background: white; border-radius: 16px; border: 1px solid var(--gray-100); overflow: hidden; }
    .tabla-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
    .tabla-title  { font-size: 14px; font-weight: 700; color: var(--navy); }
    .tabla-count  { font-size: 12px; color: var(--gray-400); }

    .user-row   { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 140px; gap: 12px; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--gray-100); transition: background .15s; }
    .user-row:last-child { border-bottom: none; }
    .user-row:hover { background: #f8f9fa; }
    .user-row.header { background: var(--gray-50); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gray-400); padding: 0.75rem 1.5rem; }

    .user-nombre  { font-size: 14px; font-weight: 600; color: var(--navy); }
    .user-empresa { font-size: 12px; color: var(--gray-600); margin-top: 2px; }
    .user-email   { font-size: 12px; color: var(--gray-600); }
    .user-nit     { font-size: 12px; color: var(--gray-600); }
    .user-fecha   { font-size: 11px; color: var(--gray-400); }

    .tipo-badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .tipo-badge.empresa       { background: #eff6ff; color: #1d4ed8; }
    .tipo-badge.transportador { background: #f0fdf4; color: #15803d; }

    .estado-badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .estado-badge.pendiente  { background: #fff7ed; color: var(--orange); }
    .estado-badge.aprobado   { background: #f0fdf4; color: var(--green); }
    .estado-badge.rechazado  { background: #fef2f2; color: var(--red); }

    .user-acciones { display: flex; gap: 6px; }
    .btn-aprobar   { background: var(--green); color: white; border: none; border-radius: 8px; padding: 6px 12px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity .2s; }
    .btn-aprobar:hover { opacity: 0.85; }
    .btn-rechazar  { background: white; color: var(--red); border: 1.5px solid var(--red); border-radius: 8px; padding: 6px 12px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s; }
    .btn-rechazar:hover { background: var(--red); color: white; }
    .btn-wa        { background: #25D366; color: white; border: none; border-radius: 8px; padding: 6px 10px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; display: inline-flex; align-items: center; }

    .empty-msg  { padding: 3rem; text-align: center; color: var(--gray-400); font-size: 14px; }
    .loading-msg { padding: 2rem; text-align: center; color: var(--gray-400); font-size: 13px; }

    /* ── OFERTAS ── */
    .ofertas-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 2rem; }

    .ofertas-lista { display: flex; flex-direction: column; gap: 12px; }

    .oferta-card { background: white; border-radius: 16px; border: 1px solid var(--gray-100); overflow: hidden; transition: box-shadow .2s; }
    .oferta-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

    .oferta-card-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 1.5rem; cursor: pointer; gap: 16px;
    }
    .oferta-card-head:hover { background: var(--gray-50); }

    .oferta-rt { font-size: 13px; font-weight: 800; color: var(--navy); letter-spacing: 0.3px; }
    .oferta-ruta { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

    .oferta-meta { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .oferta-count-badge {
      background: #eff6ff; color: #1d4ed8;
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 100px;
    }
    .oferta-min-precio {
      font-size: 15px; font-weight: 800; color: var(--green);
      white-space: nowrap;
    }
    .oferta-min-label { font-size: 10px; color: var(--gray-400); text-align: right; }

    .oferta-chevron { font-size: 14px; color: var(--gray-400); transition: transform .25s; flex-shrink: 0; }
    .oferta-card.open .oferta-chevron { transform: rotate(180deg); }

    .oferta-card-body { display: none; border-top: 1px solid var(--gray-100); }
    .oferta-card.open .oferta-card-body { display: block; }

    .ofertas-table { width: 100%; border-collapse: collapse; }
    .ofertas-table th {
      background: var(--gray-50); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: var(--gray-400);
      padding: 10px 16px; text-align: left;
    }
    .ofertas-table td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--gray-100); }
    .ofertas-table tr:last-child td { border-bottom: none; }
    .ofertas-table tr.mejor-oferta td { background: #f0fdf4; }

    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      font-size: 11px; font-weight: 800;
      background: var(--gray-100); color: var(--gray-600);
    }
    .rank-badge.rank-1 { background: #fef9c3; color: var(--gold); }

    .precio-cell { font-weight: 800; font-size: 14px; color: var(--navy); }
    .precio-cell.mejor { color: var(--green); }

    .comentario-cell { font-size: 12px; color: var(--gray-600); max-width: 200px; }

    .btn-adjudicar {
      background: var(--navy); color: white; border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 11px; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: background .2s; white-space: nowrap;
    }
    .btn-adjudicar:hover { background: var(--cyan); color: var(--navy); }
    .btn-adjudicar:disabled { background: var(--gray-100); color: var(--gray-400); cursor: default; }

    .adjudicado-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #f0fdf4; color: var(--green);
      font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 8px;
    }

    .oferta-actions-row {
      padding: 1rem 1.5rem; background: var(--gray-50);
      border-top: 1px solid var(--gray-100);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .oferta-actions-hint { font-size: 12px; color: var(--gray-400); }

    .btn-reload-ofertas {
      padding: 7px 16px; border-radius: 8px; border: 1.5px solid var(--gray-100);
      background: white; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif; color: var(--gray-600); transition: all .2s;
    }
    .btn-reload-ofertas:hover { border-color: var(--navy); color: var(--navy); }

    @media(max-width: 800px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .ofertas-stats { grid-template-columns: repeat(2, 1fr); }
      .user-row  { grid-template-columns: 1fr 1fr; gap: 8px; }
      .user-row.header { display: none; }
      .ofertas-table th:nth-child(5),
      .ofertas-table td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">

<!-- ADMIN -->
<div class="admin-wrap" id="admin-wrap">
  <nav class="admin-nav">
    <div class="admin-nav-logo">NET<span>FLEET</span> <span style="font-size:11px;font-weight:400;color:rgba(255,255,255,0.4);margin-left:8px">admin</span></div>
    <div class="admin-nav-right">
      <span class="admin-nav-user" id="admin-user-email"></span>
      <button class="admin-nav-out" onclick="cerrarSesion()">Salir</button>
    </div>
  </nav>

  <div class="admin-body">

    <!-- Tabs nav -->
    <div class="tabs-nav">
      <button class="tab-btn active" onclick="cambiarTab('usuarios', this)">Usuarios</button>
      <button class="tab-btn" onclick="cambiarTab('ofertas', this)">Ofertas &amp; Subastas</button>
    </div>

    <!-- ══ TAB: USUARIOS ══════════════════════════════════════════ -->
    <div class="tab-section active" id="tab-usuarios">

      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-num" id="stat-total">—</div>
          <div class="stat-lbl">total usuarios</div>
        </div>
        <div class="stat-card pendiente">
          <div class="stat-num" id="stat-pendiente">—</div>

          <div class="stat-num" id="stat-aprobado">—</div>
          <div class="stat-lbl">aprobados</div>
        </div>
        <div class="stat-card rechazado">
          <div class="stat-num" id="stat-rechazado">—</div>
          <div class="stat-lbl">rechazados</div>

      </div>

      <div class="filtros">
        <button class="filtro-btn active" onclick="setFiltroEstado('todos', this)">Todos</button>
        <button class="filtro-btn" onclick="setFiltroEstado('pendiente', this)">Pendientes</button>
        <button class="filtro-btn" onclick="setFiltroEstado('aprobado', this)">Aprobados</button>
        <button class="filtro-btn" onclick="setFiltroEstado('rechazado', this)">Rechazados</button>
        <div class="filtros-sep"></div>
        <button class="filtro-btn active" onclick="setFiltroTipo('todos', this)">Todos</button>
        <button class="filtro-btn" onclick="setFiltroTipo('empresa', this)">Empresas</button>
        <button class="filtro-btn" onclick="setFiltroTipo('transportador', this)">Transportadores</button>

      <div class="tabla-wrap">

          <div class="tabla-title">Usuarios registrados</div>

          <div>nombre / empresa</div>

          <div>tipo</div>
          <div>estado</div>
          <div>acciones</div>
        </div>
        <div id="usuarios-lista">
          <div class="loading-msg">Cargando usuarios...</div>
        </div>
      </div>

    </div><!-- /tab-usuarios -->

    <!-- ══ TAB: OFERTAS ═══════════════════════════════════════════ -->
    <div class="tab-section" id="tab-ofertas">

      <div class="ofertas-stats">
        <div class="stat-card">
          <div class="stat-num" id="stat-viajes-con-ofertas">—</div>
          <div class="stat-lbl">viajes con ofertas</div>
        </div>
        <div class="stat-card ofertas-act">
          <div class="stat-num" id="stat-ofertas-activas">—</div>
          <div class="stat-lbl">ofertas activas</div>
        </div>
        <div class="stat-card aprobado">
          <div class="stat-num" id="stat-adjudicadas">—</div>
          <div class="stat-lbl">adjudicadas</div>
        </div>
      </div>

      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
        <div style="font-size:13px; font-weight:700; color:var(--navy);">Subastas activas</div>
        <button class="btn-reload-ofertas" onclick="cargarOfertas()">↻ Actualizar</button>
      </div>

      <div class="ofertas-lista" id="ofertas-lista">

  </div>
</div>

<script>
  const SUPABASE_URL = 'https://pzouapqnvllaaqnmnlbs.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6b3VhcHFudmxsYWFxbm1ubGJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MzYwMTksImV4cCI6MjA5MTExMjAxOX0.lj6Hx3sr9K8afvX5cDDE0pZJx5OfI1twVC9VJ1JieaU';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const ADMIN_EMAILS = ['bernardoaristizabal@logxie.com'];
  const ADMIN_WA  = '573214401975';
  const CSV_URL   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ93JERt_-UJ7Zzb9tQQxS4hhyUfLi6WLAO-vnoAZQCPM3i55sK1VeyyVj5hmu17EXzucPcEvHosarD/pub?gid=1429690977&single=true&output=csv';

  let todosUsuarios = [];
  let filtroEstado  = 'todos';
  let filtroTipo    = 'todos';
  let viajesMap     = {}; // { rt_total → viaje }

  function parseCSV(text) {
    const lineas = text.trim().split('\n');
    if (lineas.length < 2) return [];
    const headers = lineas[0].split(',').map(h => h.trim().replace(/"/g,'').toLowerCase());
    return lineas.slice(1).map(linea => {
      const valores = [];
      let cur = '', inQ = false;
      for (let i = 0; i < linea.length; i++) {
        const c = linea[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { valores.push(cur); cur = ''; }
        else cur += c;
      }
      valores.push(cur);
      const obj = {};
      headers.forEach((h, i) => obj[h] = (valores[i] || '').trim().replace(/"/g,''));
      return obj;
    });
  }

  async function cargarViajesSheet() {
    try {
      const r = await fetch(CSV_URL);
      const texto = await r.text();
      const viajes = parseCSV(texto);
      viajes.forEach(v => {
        if (!v.rt_total) {
          const raw = `${v.origen}|${v.destino}|${v.fecha_cargue}|${v.peso_kg}`.toLowerCase();
          let hash = 0;
          for (let c = 0; c < raw.length; c++) hash = ((hash << 5) - hash + raw.charCodeAt(c)) | 0;
          v.rt_total = 'v-' + Math.abs(hash).toString(36);
        }
        viajesMap[v.rt_total] = v;
      });
    } catch(e) { console.warn('Sheet no disponible', e); }
  }

  // ── TABS ──────────────────────────────────────────────────────
  function cambiarTab(nombre, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + nombre).classList.add('active');
    if (nombre === 'ofertas') cargarOfertas();
  }

  // ── AUTH ──────────────────────────────────────────────────────
  async function iniciarSesion() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';

    if (!ADMIN_EMAILS.includes(email.toLowerCase())) {
      errEl.textContent = 'Acceso no autorizado.';
      return;
    }

    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { errEl.textContent = 'Email o contraseña incorrectos.'; return; }

    mostrarAdmin(email);
  }

  async function cerrarSesion() {
    await sb.auth.signOut();
    location.reload();
  }

  function mostrarAdmin(email) {
    document.getElementById('login-wrap').style.display   = 'none';
    document.getElementById('admin-wrap').style.display   = 'block';
    document.getElementById('admin-user-email').textContent = email;
    cargarUsuarios();
  }

  // Login desactivado temporalmente — acceso directo
  mostrarAdmin('admin');

  // ── USUARIOS ──────────────────────────────────────────────────
  async function cargarUsuarios() {
    const token = (await sb.auth.getSession()).data.session?.access_token;
    const r = await fetch(`${SUPABASE_URL}/rest/v1/perfiles?select=*&order=created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token || SUPABASE_KEY}` }
    });
    if (!r.ok) {
      document.getElementById('usuarios-lista').innerHTML =
        '<div class="empty-msg">Error al cargar usuarios: ' + r.status + '. Verifica los permisos RLS.</div>';
      return;
    }
    todosUsuarios = await r.json() || [];
    actualizarStats();
    renderUsuarios();
  }

  function actualizarStats() {
    document.getElementById('stat-total').textContent     = todosUsuarios.length;
    document.getElementById('stat-pendiente').textContent = todosUsuarios.filter(u => u.estado === 'pendiente').length;
    document.getElementById('stat-aprobado').textContent  = todosUsuarios.filter(u => u.estado === 'aprobado').length;
    document.getElementById('stat-rechazado').textContent = todosUsuarios.filter(u => u.estado === 'rechazado').length;
  }

  function renderUsuarios() {
    let lista = todosUsuarios;
    if (filtroEstado !== 'todos') lista = lista.filter(u => u.estado === filtroEstado);
    if (filtroTipo   !== 'todos') lista = lista.filter(u => u.tipo   === filtroTipo);

    document.getElementById('tabla-count').textContent = `${lista.length} usuario${lista.length !== 1 ? 's' : ''}`;

    if (!lista.length) {
      document.getElementById('usuarios-lista').innerHTML =
        '<div class="empty-msg">No hay usuarios con estos filtros.</div>';
      return;
    }

    document.getElementById('usuarios-lista').innerHTML = lista.map(u => {
      const fecha = u.created_at
        ? new Date(u.created_at).toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' })
        : '—';
      const esPendiente = u.estado === 'pendiente';
      const waMsg = encodeURIComponent(
        `Hola ${u.nombre}, tu cuenta en NETFLEET ha sido aprobada. Ya puedes acceder en https://netfleet.app`
      );

      return `
        <div class="user-row">
          <div>
            <div class="user-nombre">${u.nombre || '—'}</div>
            <div class="user-empresa">${u.empresa || '—'} · ${fecha}</div>
          </div>
          <div class="user-email">${u.email || '—'}</div>
          <div class="user-nit">${u.nit || '—'}</div>
          <div><span class="tipo-badge ${u.tipo || ''}">${u.tipo || '—'}</span></div>
          <div><span class="estado-badge ${u.estado || 'pendiente'}">${u.estado || 'pendiente'}</span></div>
          <div class="user-acciones">
            ${esPendiente ? `
              <button class="btn-aprobar"  onclick="cambiarEstado('${u.id}', 'aprobado',  '${u.telefono || ''}', '${u.nombre || ''}')">✓</button>
              <button class="btn-rechazar" onclick="cambiarEstado('${u.id}', 'rechazado', '', '')">✕</button>
            ` : ''}
            ${u.telefono ? `
              <a class="btn-wa" href="https://wa.me/${u.telefono.replace(/\D/g,'')}?text=${waMsg}" target="_blank">WA</a>
            ` : ''}
          </div>
        </div>`;
    }).join('');
  }

  async function cambiarEstado(id, nuevoEstado, telefono, nombre) {
    const token = (await sb.auth.getSession()).data.session?.access_token;
    const r = await fetch(`${SUPABASE_URL}/rest/v1/perfiles?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token || SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ estado: nuevoEstado })
    });
    if (!r.ok) { alert('Error al actualizar: ' + r.status); return; }

    const u = todosUsuarios.find(x => x.id === id);
    if (u) u.estado = nuevoEstado;
    actualizarStats();
    renderUsuarios();

    if (nuevoEstado === 'aprobado' && telefono) {
      const msg = encodeURIComponent(
        `Hola ${nombre}, tu cuenta en NETFLEET ha sido aprobada. Ya puedes acceder en https://netfleet.app`
      );
      window.open(`https://wa.me/${telefono.replace(/\D/g,'')}?text=${msg}`, '_blank');
    }
  }

  function setFiltroEstado(val, btn) {
    filtroEstado = val;
    document.querySelectorAll('.filtros .filtro-btn').forEach((b, i) => {
      if (i < 4) b.classList.toggle('active', b === btn);
    });
    renderUsuarios();
  }

  function setFiltroTipo(val, btn) {
    filtroTipo = val;
    const btns = document.querySelectorAll('.filtros .filtro-btn');
    [btns[4], btns[5], btns[6]].forEach(b => b.classList.toggle('active', b === btn));
    renderUsuarios();
  }

  // ── OFERTAS ───────────────────────────────────────────────────
  let ofertasData = []; // raw rows from DB

  async function cargarOfertas() {
    const listaEl = document.getElementById('ofertas-lista');
    listaEl.innerHTML = '<div class="loading-msg">Cargando ofertas...</div>';

    await cargarViajesSheet();

    const token = (await sb.auth.getSession()).data.session?.access_token;
    const r = await fetch(`${SUPABASE_URL}/rest/v1/ofertas?select=*&order=precio_oferta.asc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token || SUPABASE_KEY}` }
    });
    if (!r.ok) {
      listaEl.innerHTML = '<div class="empty-msg">Error al cargar ofertas: ' + r.status + '</div>';
      return;
    }
    ofertasData = await r.json() || [];
    renderOfertas();
  }

  function renderOfertas() {
    const listaEl = document.getElementById('ofertas-lista');

    // Agrupar por viaje_rt
    const grupos = {};
    ofertasData.forEach(o => {
      if (!grupos[o.viaje_rt]) grupos[o.viaje_rt] = [];
      grupos[o.viaje_rt].push(o);
    });

    // Stats
    const activas     = ofertasData.filter(o => o.estado === 'activa').length;
    const adjudicadas = Object.values(grupos).filter(g => g.some(o => o.estado === 'aceptada')).length;
    const viajesConAct = Object.values(grupos).filter(g => g.some(o => o.estado === 'activa')).length;

    document.getElementById('stat-viajes-con-ofertas').textContent = Object.keys(grupos).length;
    document.getElementById('stat-ofertas-activas').textContent    = activas;
    document.getElementById('stat-adjudicadas').textContent        = adjudicadas;

    if (!Object.keys(grupos).length) {
      listaEl.innerHTML = '<div class="empty-msg">No hay ofertas registradas todavía.</div>';
      return;
    }

    // Ordenar: viajes con más ofertas activas primero
    const viajes = Object.entries(grupos).sort((a, b) => {
      const actA = a[1].filter(o => o.estado === 'activa').length;
      const actB = b[1].filter(o => o.estado === 'activa').length;
      return actB - actA;
    });

    listaEl.innerHTML = viajes.map(([rt, ofertas]) => {
      const activas   = ofertas.filter(o => o.estado === 'activa');
      const aceptada  = ofertas.find(o => o.estado === 'aceptada');
      const yaAdj     = !!aceptada;

      // Ordenar: activas primero (por precio asc), luego el resto
      const ordenadas = [
        ...activas.sort((a, b) => a.precio_oferta - b.precio_oferta),
        ...ofertas.filter(o => o.estado !== 'activa').sort((a, b) => a.precio_oferta - b.precio_oferta)
      ];

      const minPrecio = activas.length ? activas[0].precio_oferta : null;

      const rtSafe = rt.replace(/'/g, "\\'");
      const v = viajesMap[rt] || {};
      const destinos = (v.destino || '').split(',').map(d => d.trim()).filter(Boolean);
      const destinoTexto = destinos.length > 1 ? `${destinos[0]} +${destinos.length - 1}` : (v.destino || '');
      const rutaTexto = v.origen ? `${v.origen} → ${destinoTexto}` : rt;
      const metaTexto = [
        v.fecha_cargue ? `📅 ${v.fecha_cargue}` : '',
        v.peso_kg      ? `⚖ ${Number(v.peso_kg).toLocaleString('es-CO')} kg` : '',
        v.km           ? `📍 ${v.km} km` : ''
      ].filter(Boolean).join('  ·  ');

      return `
        <div class="oferta-card" id="card-${sanitizeId(rt)}">
          <div class="oferta-card-head" onclick="toggleOferta('${sanitizeId(rt)}')">
            <div>
              <div class="oferta-rt">${rutaTexto}</div>
              <div class="oferta-ruta" style="margin-top:3px">${metaTexto}</div>
              <div class="oferta-ruta">${ofertas.length} oferta${ofertas.length !== 1 ? 's' : ''} · ${yaAdj ? '<span style="color:var(--green);font-weight:700">adjudicado</span>' : activas.length + ' activa' + (activas.length !== 1 ? 's' : '')}</div>
            </div>
            <div class="oferta-meta">
              ${minPrecio !== null ? `
                <div>
                  <div class="oferta-min-precio">${fmtCOP(minPrecio)}</div>
                  <div class="oferta-min-label">mejor oferta</div>
                </div>
              ` : ''}
              <span class="oferta-count-badge">${ofertas.length}</span>
              <span class="oferta-chevron">▼</span>
            </div>
          </div>
          <div class="oferta-card-body">
            <table class="ofertas-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>transportador</th>
                  <th>precio ofertado</th>
                  <th>contacto</th>
                  <th>comentario</th>
                  <th>acción</th>
                </tr>
              </thead>
              <tbody>
                ${ordenadas.map((o, i) => {
                  const esMejor  = o.estado === 'activa' && i === 0 && !yaAdj;
                  const esAcept  = o.estado === 'aceptada';
                  const esCancel = o.estado === 'cancelada' || o.estado === 'rechazada';
                  return `
                  <tr class="${esMejor ? 'mejor-oferta' : ''}">
                    <td><span class="rank-badge ${i === 0 && o.estado === 'activa' ? 'rank-1' : ''}">${i + 1}</span></td>
                    <td>
                      <div style="font-weight:600;font-size:13px">${o.nombre || '—'}</div>
                      <div style="font-size:11px;color:var(--gray-400)">${o.empresa || ''}</div>
                    </td>
                    <td><span class="precio-cell ${esMejor ? 'mejor' : ''}">${fmtCOP(o.precio_oferta)}</span></td>
                    <td style="font-size:12px;color:var(--gray-600)">${o.telefono || '—'}</td>
                    <td class="comentario-cell">${o.comentario || '—'}</td>
                    <td>
                      ${esAcept ? `
                        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                          <span class="adjudicado-badge">✓ Adjudicado</span>
                          ${o.telefono ? `<a class="btn-wa" href="https://wa.me/${o.telefono.replace(/\D/g,'')}?text=${encodeURIComponent('Hola ' + (o.nombre||'') + ', ¡felicitaciones! Tu oferta de ' + fmtCOP(o.precio_oferta) + ' para el viaje ' + rt + ' fue seleccionada en NETFLEET. El coordinador se pondrá en contacto pronto.')}" target="_blank">WA</a>` : ''}
                        </div>` : ''}
                      ${o.estado === 'rechazada' ? `
                        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                          <span style="font-size:11px;color:var(--gray-400);font-weight:600">Rechazada</span>
                          ${o.telefono ? `<a class="btn-wa" style="background:#868e96" href="https://wa.me/${o.telefono.replace(/\D/g,'')}?text=${encodeURIComponent('Hola ' + (o.nombre||'') + ', gracias por tu oferta en NETFLEET para el viaje ' + rt + '. En esta ocasión fue seleccionado otro transportador. ¡Seguimos contando contigo!')}" target="_blank">WA</a>` : ''}
                        </div>` : ''}
                      ${o.estado === 'cancelada' ? `<span style="font-size:11px;color:var(--gray-400);font-weight:600">Cancelada</span>` : ''}
                      ${o.estado === 'activa' && !yaAdj ? `
                        <button class="btn-adjudicar"
                          onclick="adjudicar('${rtSafe}', '${o.id}', '${(o.telefono||'').replace(/\D/g,'')}', '${(o.nombre||'').replace(/'/g,"\\'")}', '${fmtCOP(o.precio_oferta)}')">
                          Adjudicar
                        </button>
                      ` : ''}
                    </td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
            ${!yaAdj && activas.length > 0 ? `
            <div class="oferta-actions-row">
              <div class="oferta-actions-hint">La adjudicación marca al ganador y cierra las demás ofertas de este viaje.</div>
              <button class="btn-adjudicar" style="background:var(--green)"
                onclick="adjudicar('${rtSafe}', '${ordenadas[0].id}', '${(ordenadas[0].telefono||'').replace(/\D/g,'')}', '${(ordenadas[0].nombre||'').replace(/'/g,"\\'")}', '${fmtCOP(ordenadas[0].precio_oferta)}')">
                ✓ Adjudicar mejor oferta
              </button>
            </div>` : ''}
            ${yaAdj ? `
            <div class="oferta-actions-row">
              <div class="oferta-actions-hint">¿El transportador se retractó? Puedes revertir y re-adjudicar.</div>
              <button class="btn-adjudicar" style="background:var(--orange)"
                onclick="revertirAdjudicacion('${rtSafe}')">
                ↩ Revertir adjudicación
              </button>
            </div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function toggleOferta(id) {
    const card = document.getElementById('card-' + id);
    if (card) card.classList.toggle('open');
  }

  function sanitizeId(str) {
    return str.replace(/[^a-zA-Z0-9_-]/g, '_');
  }

  function fmtCOP(n) {
    if (!n && n !== 0) return '—';
    return '$' + Number(n).toLocaleString('es-CO');
  }

  async function adjudicar(viajeRt, ofertaGanadoraId, telefono, nombre, precio) {
    const ok = confirm(
      `¿Adjudicar viaje ${viajeRt} a ${nombre} por ${precio}?\n\nSe rechazarán las demás ofertas y se abrirá WhatsApp para notificar al ganador.`
    );
    if (!ok) return;

    const token = (await sb.auth.getSession()).data.session?.access_token;
    const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token || SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };

    // 1. Marcar ganadora como 'aceptada'
    const r1 = await fetch(`${SUPABASE_URL}/rest/v1/ofertas?id=eq.${ofertaGanadoraId}`, {
      method: 'PATCH', headers, body: JSON.stringify({ estado: 'aceptada' })
    });
    if (!r1.ok) { alert('Error al adjudicar: ' + r1.status); return; }

    // 2. Rechazar el resto de ofertas activas del mismo viaje
    const r2 = await fetch(`${SUPABASE_URL}/rest/v1/ofertas?viaje_rt=eq.${encodeURIComponent(viajeRt)}&estado=eq.activa`, {
      method: 'PATCH', headers, body: JSON.stringify({ estado: 'rechazada' })
    });
    if (!r2.ok) { alert('Adjudicado pero error al rechazar otras: ' + r2.status); }

    // 3. Actualizar local y re-render
    ofertasData.forEach(o => {
      if (o.id === ofertaGanadoraId) o.estado = 'aceptada';
      else if (o.viaje_rt === viajeRt && o.estado === 'activa') o.estado = 'rechazada';
    });
    renderOfertas();

    // Reabrir la card
    setTimeout(() => {
      const card = document.getElementById('card-' + sanitizeId(viajeRt));
      if (card && !card.classList.contains('open')) card.classList.add('open');
    }, 50);

    // 4. Abrir WhatsApp solo con el ganador
    if (telefono) {
      const msg = encodeURIComponent(
        `Hola ${nombre}, ¡felicitaciones! Tu oferta de ${precio} para el viaje ${viajeRt} ha sido seleccionada en NETFLEET. El coordinador se pondrá en contacto contigo pronto.`
      );
      window.open(`https://wa.me/${telefono}?text=${msg}`, '_blank');
    }
  }

  async function revertirAdjudicacion(viajeRt) {
    const ok = confirm(`¿Revertir la adjudicación del viaje ${viajeRt}? Todas las ofertas volverán a estado activo.`);
    if (!ok) return;

    const token = (await sb.auth.getSession()).data.session?.access_token;
    const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token || SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };

    // Reactivar aceptada y rechazadas del viaje
    const r = await fetch(`${SUPABASE_URL}/rest/v1/ofertas?viaje_rt=eq.${encodeURIComponent(viajeRt)}&estado=in.(aceptada,rechazada)`, {
      method: 'PATCH', headers, body: JSON.stringify({ estado: 'activa' })
    });
    if (!r.ok) { alert('Error al revertir: ' + r.status); return; }

    ofertasData.forEach(o => {
      if (o.viaje_rt === viajeRt && (o.estado === 'aceptada' || o.estado === 'rechazada')) o.estado = 'activa';
    });
    renderOfertas();
    setTimeout(() => {
      const card = document.getElementById('card-' + sanitizeId(viajeRt));
      if (card && !card.classList.contains('open')) card.classList.add('open');
    }, 50);
  }
</script>
</body>
</html>
