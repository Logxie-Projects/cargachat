<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>CARGACHAT — Tarjeta de Viaje</title>

  <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  viaje.html — TARJETA DE VIAJE PARA SCREENSHOT              ║
    ║                                                              ║
    ║  Esta página muestra UNA SOLA tarjeta con los datos de un   ║
    ║  viaje específico. Está diseñada para ser capturada por      ║
    ║  Screenshotone y publicada en LinkedIn con cada viaje nuevo. ║
    ║                                                              ║
    ║  CÓMO FUNCIONA:                                              ║
    ║  1. n8n procesa un mail de consolidación                     ║
    ║  2. Construye una URL con los datos del viaje como params    ║
    ║  3. Screenshotone abre esa URL y toma la foto                ║
    ║  4. La foto se publica en LinkedIn                           ║
    ║                                                              ║
    ║  EJEMPLO DE URL:                                             ║
    ║  viaje.html?origen=Funza&destino=Cucuta,Bucaramanga          ║
    ║            &peso=1219&fecha=31/03/2026&cajas=40              ║
    ║            &precio=1200000                                   ║
    ╚══════════════════════════════════════════════════════════════╝

    DEPENDENCIAS EXTERNAS:
    - DM Sans (Google Fonts): tipografía principal del sistema
    - Leaflet 1.9.4: librería de mapas interactivos open source
    - CartoDB tiles: mapas en blanco y negro (más elegantes que Google Maps)
    - Google Geocoding API: para ciudades no encontradas en el diccionario local
  -->

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    /* ─── RESET Y BASE ───────────────────────────────────────────
       Eliminamos márgenes y paddings por defecto del navegador
       y usamos border-box para que el padding no sume al ancho.
    ──────────────────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── COLORES DE MARCA CARGACHAT ─────────────────────────────
       Navy: color principal de marca
       Cyan: color de acento
       Gray: fondo y textos secundarios
    ──────────────────────────────────────────────────────────── */
    :root {
      --navy:      #1B2A6B;
      --cyan:      #00BFDF;
      --green:     #00c48c;
      --gray-bg:   #f0f4ff;
      --gray-card: #f8f9fc;
      --gray-border: #eef0f6;
      --gray-text: #9aa0b8;
      --gray-dark: #5a6280;
    }

    /* ─── BODY ───────────────────────────────────────────────────
       Centramos la tarjeta horizontal y verticalmente.
       El fondo gris azulado hace que la tarjeta blanca resalte.
    ──────────────────────────────────────────────────────────── */
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gray-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* ─── TARJETA PRINCIPAL ──────────────────────────────────────
       Ancho fijo de 520px para que el screenshot siempre
       tenga las mismas proporciones en LinkedIn.
    ──────────────────────────────────────────────────────────── */
    .card {
      background: white;
      border-radius: 20px;
      padding: 1.25rem;
      width: 520px;
      box-shadow: 0 4px 24px rgba(27, 42, 107, 0.10);
    }

    /* ─── HEADER DE LA TARJETA ───────────────────────────────────
       Logo CARGACHAT a la izquierda, badge "Viaje disponible" a la derecha.
    ──────────────────────────────────────────────────────────── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--gray-border);
    }

    .logo        { font-size: 18px; font-weight: 600; color: var(--navy); letter-spacing: -0.5px; }
    .logo span   { color: var(--cyan); }  /* La palabra "CHAT" en cyan */
    .logo-sub    { font-size: 10px; color: var(--gray-text); margin-top: 1px; }
    .badge       { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 99px; background: #fff0e6; color: #cc5500; }

    /* ─── RUTA PRINCIPAL ─────────────────────────────────────────
       "Funza → Cúcuta +2 destinos" — lo más importante de la tarjeta.
       Texto grande y bold para que sea lo primero que se ve.
    ──────────────────────────────────────────────────────────── */
    .ruta        { font-size: 19px; font-weight: 600; color: var(--navy); margin-bottom: 3px; line-height: 1.3; }
    .destinos-sub { font-size: 11px; color: var(--gray-text); margin-bottom: 0.75rem; line-height: 1.5; }

    /* ─── MAPA ───────────────────────────────────────────────────
       Leaflet necesita un contenedor con altura definida.
       Sin esto el mapa no se renderiza correctamente.
    ──────────────────────────────────────────────────────────── */
    .map-container {
      border-radius: 12px;
      overflow: hidden;       /* Para que el mapa respete el border-radius */
      margin-bottom: 0.75rem;
      height: 220px;
      border: 1px solid var(--gray-border);
    }

    /* ─── GRILLA DE METADATOS ────────────────────────────────────
       3 columnas iguales para: peso, fecha, unidades.
    ──────────────────────────────────────────────────────────── */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 7px;
      margin-bottom: 0.75rem;
    }

    .meta-item  { background: var(--gray-card); border-radius: 10px; padding: 9px 11px; }
    .meta-label { font-size: 10px; color: var(--gray-text); margin-bottom: 2px; }
    .meta-value { font-size: 13px; font-weight: 600; color: var(--navy); }

    /* ─── CAJA DE PRECIO ─────────────────────────────────────────
       Se muestra solo si hay precio disponible (display: none por defecto).
       Contiene el precio a la izquierda y los botones a la derecha.
    ──────────────────────────────────────────────────────────── */
    .precio-box {
      background: #f0f4ff;
      border-radius: 12px;
      padding: 11px 14px;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .precio-label { font-size: 10px; color: var(--gray-dark); margin-bottom: 2px; }
    .precio-value { font-size: 22px; font-weight: 600; color: var(--navy); }
    .precio-sub   { font-size: 10px; color: var(--gray-text); margin-top: 1px; }

    /* Botones de acción: Aceptar (verde) y Hacer oferta (navy) */
    .btn-accion {
      font-size: 11px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 99px;
      color: white;
      cursor: pointer;
    }

    .btn-aceptar { background: var(--green); }
    .btn-ofertar { background: var(--navy); }

    /* ─── FOOTER DE LA TARJETA ───────────────────────────────────
       URL de la plataforma para que el transportador sepa
       dónde ir a ver más viajes.
    ──────────────────────────────────────────────────────────── */
    .card-footer      { text-align: center; padding-top: 0.6rem; border-top: 1px solid var(--gray-border); }
    .card-footer-text { font-size: 11px; color: var(--gray-text); }
    .card-footer-url  { font-weight: 600; color: var(--navy); }
  </style>
</head>

    // ================================================================
    // FUNCIONES DE UTILIDAD

    /**
     * Busca las coordenadas de una ciudad en el diccionario local.
     * Normaliza el texto para manejar tildes y mayúsculas.
     * @param {string} ciudad - Nombre de la ciudad a buscar
     * @returns {[number, number]|null} - [lat, lng] o null si no se encuentra
     */
    function getCoordenadas(ciudad) {
      if (!ciudad) return null;

      // Normalizar: minúsculas, sin tildes, sin espacios extras
      const key = ciudad
        .toLowerCase()
        .normalize('NFD')                    // Descompone caracteres con tildes
        .replace(/[\u0300-\u036f]/g, '')     // Elimina las tildes
        .trim();

      for (const [nombre, coords] of Object.entries(CIUDADES)) {
        const nombreNorm = nombre
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '');

        // Busca coincidencia exacta o parcial (para "Funza, Cundinamarca" → "Funza")
        if (nombreNorm === key || key.includes(nombreNorm) || nombreNorm.includes(key)) {
          return coords;
        }
      }

      return null; // Ciudad no encontrada en el diccionario
    }

    /**
     * Busca las coordenadas de una ciudad usando la API de Google Maps Geocoding.
     * Solo se llama cuando la ciudad NO está en el diccionario local.
     * @param {string} ciudad - Nombre de la ciudad
     * @returns {[number, number]|null} - [lat, lng] o null si falla
     */
    async function geocodeCiudad(ciudad) {
      try {
        const query = encodeURIComponent(ciudad + ', Colombia');
        const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${query}&key=${GMAPS_KEY}`;
        const respuesta = await fetch(url);
        const datos = await respuesta.json();

        if (datos.results && datos.results[0]) {
          const loc = datos.results[0].geometry.location;
          return [loc.lat, loc.lng];
        }
      } catch (error) {
        console.warn('Geocoding falló para:', ciudad, error);
      }
      return null;
    }

    /**
     * Obtiene coordenadas de una ciudad.
     * Primero busca en el diccionario local (rápido y gratis).
     * Si no encuentra, consulta Google Maps (más lento, tiene costo).
     * @param {string} ciudad
     * @returns {[number, number]|null}
     */
    async function getCoords(ciudad) {
      return getCoordenadas(ciudad) || await geocodeCiudad(ciudad);
    }

    /**
     * Formatea un peso en kg a texto legible.
     * Ejemplo: 1219 → "1.2 ton", 800 → "800 kg"
     */
    function formatPeso(kg) {
      const n = parseFloat(kg);
      if (isNaN(n) || n === 0) return '—';
      return n >= 1000
        ? `${(n / 1000).toFixed(1)} ton`
        : `${Math.round(n)} kg`;
    }

    /**
     * Formatea un número como moneda colombiana.
     * Ejemplo: 1200000 → "$1.200.000"
     */
    function formatCOP(valor) {
      if (!valor || valor === 0) return null;
      return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        maximumFractionDigits: 0
      }).format(valor);
    }

    // ================================================================
    // FUNCIÓN PRINCIPAL — INICIALIZACIÓN
    // ================================================================
    /**
     * Lee los parámetros de la URL, llena la tarjeta con los datos
     * y dibuja el mapa con la ruta del viaje.
     *
     * Los parámetros que acepta la URL son:
     * - origen: ciudad de origen (ej: "Funza")
     * - destino: ciudades de destino separadas por coma (ej: "Cucuta,Bucaramanga")
     * - peso: peso en kg (ej: "1219")
     * - fecha: fecha de cargue (ej: "31/03/2026")
     * - cajas: número de cajas
     * - bidones: número de bidones
     * - precio: precio base en pesos (ej: "1200000")
     */
    async function init() {

      // ── Leer parámetros de la URL ──────────────────────────────
      // URLSearchParams convierte "?origen=Funza&peso=1219" en un objeto
      const params = new URLSearchParams(window.location.search);
      const origen  = params.get('origen')  || '';
      const destino = params.get('destino') || '';
      const peso    = params.get('peso')    || '0';
      const fecha   = params.get('fecha')   || '';
      const cajas   = params.get('cajas')   || '0';
      const bidones = params.get('bidones') || '0';
      const precio  = parseFloat(params.get('precio') || '0') || 0;

      // ── Procesar destinos ──────────────────────────────────────
      // "Cucuta, Bucaramanga, Aguachica" → ["Cucuta", "Bucaramanga", "Aguachica"]
      const destinos = destino.split(',').map(d => d.trim()).filter(Boolean);

      // Texto resumido para mostrar en la tarjeta
      // "Cucuta +2 destinos" cuando hay más de uno
      const destinoTexto = destinos.length > 1
        ? `${destinos[0]} +${destinos.length - 1} destinos`
        : destino;

      // Lista completa de destinos para mostrar debajo de la ruta principal
      const destinoTooltip = destinos.length > 1
        ? destinos.join(' · ')
        : '';

      // ── Llenar la tarjeta con los datos ───────────────────────
      document.getElementById('ruta').textContent = `${origen} → ${destinoTexto}`;
      document.getElementById('destinos-sub').textContent = destinoTooltip;
      document.getElementById('peso').textContent = formatPeso(peso);
      document.getElementById('fecha').textContent = fecha || 'Por confirmar';

      // Texto de unidades: solo muestra los que tienen valor > 0
      const unidades = [];
      if (parseInt(cajas)   > 0) unidades.push(`${cajas} cajas`);
      if (parseInt(bidones) > 0) unidades.push(`${bidones} bidones`);
      document.getElementById('unidades').textContent = unidades.join(', ') || 'Ver detalle';

      // Mostrar precio si hay uno disponible
      if (precio > 0) {
        document.getElementById('precio').textContent = formatCOP(precio);
        document.getElementById('precio-box').style.display = 'flex';
      }

      // ── Inicializar el mapa ────────────────────────────────────
      // zoomControl: false → sin botones de zoom (más limpio para screenshot)
      // attributionControl: false → sin el texto "Leaflet | OpenStreetMap" (más limpio)
      const map = L.map('map', {
        zoomControl: false,
        attributionControl: false
      }).setView([4.5709, -74.2973], 6); // Vista inicial: Colombia completa

      // Capa de tiles: CartoDB "light_all" = mapa en blanco y negro elegante
      // {s} = subdomain (a,b,c,d) para distribuir la carga de requests
      // {z}/{x}/{y} = nivel de zoom y coordenadas del tile
      // {r} = sufijo "@2x" en pantallas de alta densidad
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 18
      }).addTo(map);

      // ── Icono personalizado para el ORIGEN ────────────────────
      // L.divIcon permite crear un marcador con HTML/CSS puro
      // Punto cyan más grande = origen del viaje
      const iconOrigen = L.divIcon({
        html: `<div style="
          width: 14px; height: 14px;
          border-radius: 50%;
          background: #00BFDF;
          border: 3px solid white;
          box-shadow: 0 2px 6px rgba(0,191,223,0.5);
        "></div>`,
        iconSize:   [14, 14],
        iconAnchor: [7, 7],    // Punto de anclaje = centro del círculo
        className:  ''         // Sin clase de Leaflet por defecto
      });

      // Arrays para manejar los puntos del mapa
      const bounds = []; // Para hacer fitBounds() al final y ver todo el mapa
      const puntos  = []; // Para trazar la línea de ruta

      // ── Agregar pin de ORIGEN ──────────────────────────────────
      const coordOrigen = await getCoords(origen);
      if (coordOrigen) {
        bounds.push(coordOrigen);
        puntos.push(coordOrigen);
        L.marker(coordOrigen, { icon: iconOrigen })
          .addTo(map)
          .bindPopup(`<b>${origen}</b><br>Origen`);
      }

      // ── Agregar pins de DESTINOS ───────────────────────────────
      // Obtenemos las coordenadas de todos los destinos en paralelo
      // Promise.all() espera a que TODAS las promesas terminen antes de continuar
      const destinosConCoord = await Promise.all(
        destinos.map(async (d) => ({
          nombre: d,
          coord: await getCoords(d)
        }))
      );

      // Filtrar los que no se encontraron y ordenar de sur a norte
      // (menor latitud = más al sur) para trazar la ruta en orden geográfico
      const destinosOrdenados = destinosConCoord
        .filter(d => d.coord !== null)
        .sort((a, b) => a.coord[0] - b.coord[0]);

      destinosOrdenados.forEach((dest, idx) => {
        bounds.push(dest.coord);
        puntos.push(dest.coord);

        // Número de parada: "1", "2", "3"... (solo si hay múltiples destinos)
        const num = destinosOrdenados.length > 1 ? `${idx + 1}` : '';

        // Icono de destino: punto navy pequeño con número encima
        const iconDest = L.divIcon({
          html: `<div style="position: relative;">
            <div style="
              width: 12px; height: 12px;
              border-radius: 50%;
              background: #1B2A6B;
              border: 2px solid white;
              box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            "></div>
            ${num ? `<div style="
              position: absolute; top: -8px; left: 11px;
              background: #1B2A6B; color: white;
              font-size: 9px; font-weight: 700;
              padding: 1px 4px; border-radius: 3px;
            ">${num}</div>` : ''}
          </div>`,
          iconSize:   [12, 12],
          iconAnchor: [6, 6],
          className:  ''
        });

        L.marker(dest.coord, { icon: iconDest })
          .addTo(map)
          .bindPopup(`<b>${dest.nombre}</b>`);
      });

      // ── Trazar la línea de ruta ────────────────────────────────
      // polyline() une todos los puntos con una línea punteada
      if (puntos.length > 1) {
        L.polyline(puntos, {
          color:     '#1B2A6B',
          weight:    2.5,
          opacity:   0.6,
          dashArray: '6 4'    // Línea punteada: 6px línea, 4px espacio
        }).addTo(map);
      }

      // ── Ajustar el zoom para ver todos los puntos ──────────────
      // fitBounds() calcula automáticamente el zoom necesario
      if (bounds.length > 1) {
        map.fitBounds(bounds, { padding: [20, 20] });
      } else if (bounds.length === 1) {
        map.setView(bounds[0], 10); // Zoom más cercano si solo hay un punto
      }

    } // fin init()

    // Ejecutar cuando la página cargue
    init();

  </script>
</body>
</html>
